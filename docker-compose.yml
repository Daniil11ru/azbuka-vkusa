services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pricing
      POSTGRES_USER: pricing
      POSTGRES_PASSWORD: pricing
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricing -d pricing"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://pricing:pricing@db:5432/pricing
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: demo-secret-not-for-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
